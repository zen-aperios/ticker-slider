<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ticker Slider Pen</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="demo">
      <h1>Ticker Slider</h1>

      <section class="ticker-slider" data-direction="left" data-speed="80">
        <div class="track">
          <span>Design</span><span>Motion</span><span>Webflow</span><span>GSAP</span><span>CodePen</span><span>Creative Dev</span>
        </div>
      </section>

      <section class="ticker-slider" data-direction="right" data-speed="80">
        <div class="track">
          <span>Portfolio</span><span>Studio</span><span>Scroll</span><span>Typography</span><span>Animation</span><span>Interaction</span>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
